<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dapur Ibu — 100+ Resep Lengkap</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#FDF8F0;--warm:#F5EDD8;--orange:#E8652A;--orange-light:#F2895A;
  --green:#3A6B4A;--green-light:#EBF3EE;--brown:#5C3D1E;--brown-mid:#7A4F2A;
  --text:#2C1A0E;--muted:#8A6E55;--white:#FFFFFF;--border:#EDE3D4;
  --shadow:0 2px 16px rgba(44,26,14,.09);--shadow-lg:0 8px 40px rgba(44,26,14,.15);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;}
h1,h2,h3,h4{font-family:'Playfair Display',serif;}

/* HEADER */
.header{background:var(--brown);padding:1rem 1.4rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2);}
.logo{color:var(--cream);font-family:'Playfair Display',serif;font-size:20px;font-weight:700;}
.logo span{color:#F2C97E;}
.header-sub{color:#C8A87A;font-size:11px;}
.random-btn-sm{background:var(--orange);color:white;border:none;padding:8px 14px;border-radius:50px;font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:6px;}
.random-btn-sm:hover{background:var(--orange-light);}

/* HERO */
.hero{background:linear-gradient(135deg,var(--brown) 0%,var(--brown-mid) 100%);padding:1.8rem 1.4rem 2.5rem;text-align:center;overflow:hidden;position:relative;}
.hero::before{content:'🍳';font-size:100px;position:absolute;right:-10px;top:-10px;opacity:.08;}
.hero::after{content:'🥘';font-size:80px;position:absolute;left:-5px;bottom:-15px;opacity:.08;}
.hero h1{color:var(--cream);font-size:clamp(24px,5vw,36px);font-weight:900;line-height:1.2;margin-bottom:.4rem;}
.hero h1 span{color:#F2C97E;}
.hero p{color:#C8A87A;font-size:13px;margin-bottom:1.4rem;}
.hero-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.1);color:var(--cream);padding:5px 14px;border-radius:20px;font-size:12px;margin-bottom:1.2rem;}
.random-btn-hero{background:var(--orange);color:white;border:none;padding:13px 26px;border-radius:50px;font-size:15px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;display:inline-flex;align-items:center;gap:8px;box-shadow:0 4px 20px rgba(232,101,42,.4);transition:all .2s;}
.random-btn-hero:hover{background:var(--orange-light);transform:translateY(-2px);}

/* FILTER */
.filter-wrap{background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:58px;z-index:90;padding:.8rem 1.2rem .5rem;}
.filter-row{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px;}
.filter-row::-webkit-scrollbar{display:none;}
.fbtn{flex-shrink:0;padding:7px 14px;border-radius:50px;border:1.5px solid var(--border);background:transparent;font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--muted);transition:all .18s;white-space:nowrap;}
.fbtn.active{background:var(--brown);border-color:var(--brown);color:var(--cream);}
.fbtn:hover:not(.active){border-color:var(--orange);color:var(--orange);}
.cat-row{display:flex;gap:6px;margin-top:8px;overflow-x:auto;scrollbar-width:none;}
.cat-row::-webkit-scrollbar{display:none;}
.cbtn{flex-shrink:0;padding:5px 13px;border-radius:50px;border:1.5px solid var(--border);background:transparent;font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--muted);transition:all .18s;}
.cbtn.active{background:var(--green);border-color:var(--green);color:white;}

/* SEARCH */
.search-wrap{padding:.7rem 1.2rem;background:var(--white);position:relative;}
.search-input{width:100%;padding:9px 14px 9px 38px;border:1.5px solid var(--border);border-radius:50px;font-size:13px;font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);outline:none;transition:border .2s;}
.search-input:focus{border-color:var(--orange);}
.si{position:absolute;left:24px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none;}

/* STATS BAR */
.stats-bar{padding:.5rem 1.2rem;display:flex;align-items:center;justify-content:space-between;}
.stats-text{font-size:12px;color:var(--muted);}
.stats-count{font-size:13px;font-weight:500;color:var(--brown);}

/* GRID */
.grid-section{padding:.5rem 1.2rem 1.5rem;}
.sec-title{font-size:16px;font-weight:700;color:var(--brown);margin-bottom:.8rem;display:flex;align-items:center;gap:8px;margin-top:1rem;}
.sec-title .ln{flex:1;height:1px;background:linear-gradient(to right,var(--border),transparent);}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:12px;}
.card{background:var(--white);border-radius:14px;overflow:hidden;cursor:pointer;transition:all .22s;box-shadow:var(--shadow);border:1px solid rgba(237,227,212,.4);}
.card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);}
.card-em{background:var(--warm);padding:1.2rem;text-align:center;font-size:38px;position:relative;}
.card-bdr{position:absolute;top:7px;right:7px;font-size:9px;padding:2px 7px;border-radius:12px;font-weight:700;font-family:'DM Sans',sans-serif;letter-spacing:.02em;}
.bi{background:#FFE4CC;color:#C44D00;}
.ba{background:#FFE0E0;color:#A00;}
.be{background:#E0E8FF;color:#003080;}
.bam{background:#E8FFE8;color:#005000;}
.card-body{padding:10px 10px 12px;}
.card-title{font-size:13px;font-weight:500;color:var(--text);line-height:1.3;margin-bottom:4px;}
.card-meta{font-size:11px;color:var(--muted);display:flex;gap:5px;align-items:center;}
.dot{width:3px;height:3px;border-radius:50%;background:var(--muted);}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(30,15,5,.65);z-index:200;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;animation:fi .2s;}
@keyframes fi{from{opacity:0}to{opacity:1}}
.modal{background:var(--white);border-radius:22px 22px 0 0;width:100%;max-width:600px;max-height:93vh;overflow-y:auto;animation:su .28s ease;}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mhero{background:var(--warm);padding:1.5rem 1.4rem 1.2rem;position:relative;}
.mclose{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.75);border:none;width:32px;height:32px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--brown);}
.mclose:hover{background:white;}
.m-em{font-size:52px;display:block;margin-bottom:.7rem;}
.m-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--brown);margin-bottom:.4rem;}
.m-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:.5rem;}
.m-meta{font-size:12px;color:var(--muted);display:flex;gap:14px;flex-wrap:wrap;}
.mbody{padding:1.2rem 1.4rem;}
.msec{margin-bottom:1.4rem;}
.msec h3{font-size:15px;font-weight:700;color:var(--brown);margin-bottom:.7rem;display:flex;align-items:center;gap:8px;}
.msec h3::after{content:'';flex:1;height:1px;background:var(--border);}
.ing-list{display:flex;flex-direction:column;gap:5px;}
.ing{display:flex;align-items:center;gap:9px;padding:7px 11px;background:var(--cream);border-radius:7px;font-size:13px;}
.idot{width:7px;height:7px;border-radius:50%;background:var(--orange);flex-shrink:0;}
.iamt{margin-left:auto;font-size:11px;color:var(--muted);font-weight:500;}
.steps{display:flex;flex-direction:column;gap:9px;}
.step{display:flex;gap:11px;align-items:flex-start;}
.snum{width:26px;height:26px;border-radius:50%;background:var(--brown);color:var(--cream);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
.stext{font-size:13px;line-height:1.6;flex:1;padding-top:3px;}
.tips-box{background:var(--green-light);border-left:3px solid var(--green);border-radius:0 7px 7px 0;padding:9px 13px;font-size:13px;color:#2D5239;line-height:1.6;}
.badge{display:inline-block;font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;}
.bk-ok{background:#E1F5EE;color:#085041;}
.bk-bad{background:#FCEBEB;color:#791F1F;}

/* RANDOM MODAL */
.r-result{background:var(--brown);border-radius:14px;padding:1.4rem;text-align:center;margin-bottom:1.2rem;}
.r-em{font-size:60px;display:block;margin-bottom:.7rem;}
.r-result h2{color:var(--cream);font-size:20px;margin-bottom:.3rem;}
.r-result p{color:#C8A87A;font-size:12px;}
.btn-view{background:var(--orange);color:white;border:none;padding:11px 22px;border-radius:50px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:.8rem;}
.btn-reroll{background:transparent;color:var(--cream);border:1.5px solid rgba(255,255,255,.3);padding:9px 18px;border-radius:50px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;margin:.5rem .3rem 0;}
.no-res{text-align:center;padding:2.5rem;color:var(--muted);font-size:14px;}

@media(max-width:400px){
  .cards{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>
<body>

<div class="header">
  <div><div class="logo">Dapur <span>Ibu</span></div><div class="header-sub">100+ resep pilihan</div></div>
  <button class="random-btn-sm" onclick="openRandom()">🎲 Acak Menu</button>
</div>

<div class="hero">
  <div class="hero-badge">✨ 100+ resep dari 4 penjuru dunia</div>
  <h1>Masak Apa <span>Hari Ini?</span></h1>
  <p>Indonesia · Asia · Eropa · Amerika — semua bahan mudah dicari</p>
  <button class="random-btn-hero" onclick="openRandom()">🎲 Pilihkan Menu Hari Ini!</button>
</div>

<div class="filter-wrap">
  <div class="filter-row">
    <button class="fbtn active" onclick="setOri('semua',this)">🌍 Semua</button>
    <button class="fbtn" onclick="setOri('indonesia',this)">🇮🇩 Indonesia</button>
    <button class="fbtn" onclick="setOri('asia',this)">🌏 Asia</button>

    <button class="cbtn" onclick="setCat('camilan',this)">🍿 Camilan</button>
    <button class="cbtn" onclick="setCat('minuman',this)">🥤 Minuman</button>
  </div>
</div>

<div class="search-wrap">
  <span class="si">🔍</span>
  <input class="search-input" type="text" id="si" placeholder="Cari resep... (misal: ayam, nasi, cokelat)" oninput="render()" style="padding-left:36px;">
</div>

<div class="stats-bar">

</div>

<div class="grid-section" id="grid"></div>

<!-- MODAL RESEP -->
<div class="overlay" id="recipeModal" onclick="if(event.target===this)closeMR()">
  <div class="modal">
    <div class="mhero">
      <button class="mclose" onclick="closeMR()">✕</button>
      <span class="m-em" id="mEm"></span>
      <div class="m-title" id="mTit"></div>
      <div class="m-tags" id="mTags"></div>
      <div class="m-meta" id="mMeta"></div>
    </div>
    <div class="mbody">
      <div class="msec"><h3>🛒 Bahan-Bahan</h3><div class="ing-list" id="mIng"></div></div>
      <div class="msec"><h3>👩‍🍳 Cara Memasak</h3><div class="steps" id="mSteps"></div></div>
      <div class="msec" id="mTipsWrap"><h3>💡 Tips Memasak</h3><div class="tips-box" id="mTips"></div></div>
    </div>
  </div>
</div>

<!-- MODAL RANDOM -->
<div class="overlay" id="randomModal" onclick="if(event.target===this)document.getElementById('randomModal').classList.remove('open')">
  <div class="modal" style="border-radius:22px 22px 0 0;">
    <div class="mbody">
      <div style="display:flex;justify-content:flex-end;margin-bottom:.8rem;">
        <button class="mclose" style="position:static" onclick="document.getElementById('randomModal').classList.remove('open')">✕</button>
      </div>
      <div class="r-result" id="rResult"></div>
      <div style="text-align:center;padding-bottom:1rem;">
        <button class="btn-view" id="btnVR">Lihat Resep Lengkap</button>
        <button class="btn-reroll" onclick="rollRandom()">🎲 Acak Lagi</button>
      </div>
    </div>
  </div>
</div>

langkah:['Rebus daging hingga empuk, potong dadu. Simpan kaldunya.','Tumis bawang merah, bawang putih, cengkeh, kayu manis hingga harum.','Masukkan daging, aduk rata.','Tuang kaldu secukupnya, tambahkan kecap manis, pala, gula merah, garam.','Masukkan kentang dan telur rebus.','Masak api kecil hingga kuah mengental dan bumbu meresap.','Koreksi rasa, sajikan dengan nasi.'],

{id:8,emoji:'🍢',title:'Sate Ayam Madura',origin:'indonesia',category:'utama',waktu:'45 mnt',porsi:'4 porsi',tingkat:'Mudah',
bahan:[{nama:'Dada/paha ayam',jumlah:'400 g'},{nama:'Tusuk sate',jumlah:'20 btg'},{nama:'Kecap manis',jumlah:'4 sdm'},{nama:'Minyak goreng',jumlah:'2 sdm'},{nama:'BUMBU KACANG: Kacang tanah goreng',jumlah:'200 g'},{nama:'Cabai rawit',jumlah:'5 bh'},{nama:'Bawang putih',jumlah:'3 siung'},{nama:'Kecap manis',jumlah:'3 sdm'},{nama:'Gula merah',jumlah:'1 sdm'},{nama:'Garam',jumlah:'sck'},{nama:'Air panas',jumlah:'150 ml'}],
langkah:['Potong ayam dadu 2–3 cm, tusuk 4–5 potong per tusuk.','Olesi kecap manis dan minyak, marinasi 15 mnt.','Buat bumbu kacang: haluskan kacang, cabai, bawang putih. Tambahkan kecap, gula, garam, air panas. Masak sebentar.','Bakar sate di atas bara/teflon sambil dibolak-balik dan diolesi kecap.','Sajikan dengan bumbu kacang dan lontong.'],

{id:9,emoji:'🍜',title:'Bakso Kuah',origin:'indonesia',category:'utama',waktu:'90 mnt',porsi:'6 porsi',tingkat:'Menengah',
bahan:[{nama:'Daging sapi giling halus',jumlah:'500 g'},{nama:'Tepung tapioka',jumlah:'100 g'},{nama:'Putih telur',jumlah:'2 btr'},{nama:'Bawang putih halus',jumlah:'5 siung'},{nama:'Garam',jumlah:'2 sdt'},{nama:'Merica',jumlah:'1 sdt'},{nama:'Es batu halus',jumlah:'100 g'},{nama:'KUAH: Tulang sapi',jumlah:'500 g'},{nama:'Bawang putih goreng',jumlah:'5 siung'},{nama:'Daun bawang',jumlah:'3 btg'},{nama:'Seledri',jumlah:'2 btg'}],
langkah:['Campur daging giling, tepung tapioka, putih telur, bawang putih, garam, merica, es batu. Aduk rata.','Rebus air mendidih. Ambil adonan, bentuk bulat dengan tangan dan sendok, langsung masukkan ke air mendidih.','Masak hingga bakso mengapung, angkat.','Buat kuah: rebus tulang sapi 2 jam, saring. Tumis bawang putih, masukkan ke kaldu.','Beri garam dan merica pada kuah. Sajikan bakso dengan kuah, mie, tahu.'],
tips:'Es batu adalah rahasia bakso kenyal. Aduk adonan hingga benar-benar homogen dan dingin.'},

{id:11,emoji:'🥗',title:'Pecel Sayuran',origin:'indonesia',category:'utama',waktu:'30 mnt',porsi:'3 porsi',tingkat:'Mudah',

{id:14,emoji:'🐟',title:'Ikan Bakar Bumbu Bali',origin:'indonesia',category:'utama',waktu:'40 mnt',porsi:'3 porsi',tingkat:'Mudah',

bahan:[{nama:'Kulit gyoza / kulit pangsit beli jadi',jumlah:'30 lbr'},{nama:'ISIAN: Daging ayam/babi cincang',jumlah:'200 g'},{nama:'Kol cincang halus',jumlah:'150 g'},{nama:'Daun bawang',jumlah:'3 btg'},{nama:'Jahe parut',jumlah:'1 cm'},{nama:'Bawang putih',jumlah:'2 siung'},{nama:'Kecap asin',jumlah:'2 sdm'},{nama:'Minyak wijen',jumlah:'1 sdm'},{nama:'Merica',jumlah:'sck'},{nama:'Garam',jumlah:'sck'}],
langkah:['Beri garam pada kol cincang, peras airnya.','Campur semua bahan isian, aduk rata.','Taruh 1 sdt isian di tengah kulit gyoza.','Basahi pinggir kulit, lipat setengah lingkaran, buat plisket di pinggir.','Panaskan minyak di teflon, taruh gyoza. Goreng 2 mnt.','Tuang 50 ml air, tutup rapat, kukus 5 mnt.','Buka tutup, masak hingga air habis dan bawah kecokelatan.'],
tips:'Teknik gyoza adalah kombinasi menggoreng dan mengukus (yaki + mushi) yang menghasilkan bawah crispy dan isian lembut.'},

{id:68,emoji:'🍛',title:'Nasi Lemak Malaysia',origin:'asia',category:'utama',waktu:'50 mnt',porsi:'4 porsi',tingkat:'Menengah',
bahan:[{nama:'Beras',jumlah:'2 cangkir'},{nama:'Santan kental',jumlah:'300 ml'},{nama:'Serai',jumlah:'2 btg'},{nama:'Daun pandan',jumlah:'2 lbr'},{nama:'Garam',jumlah:'sck'},{nama:'SAMBAL: Cabai kering',jumlah:'10 bh'},{nama:'Bawang merah',jumlah:'8 siung'},{nama:'Bawang putih',jumlah:'4 siung'},{nama:'Udang ebi',jumlah:'2 sdm'},{nama:'Gula merah',jumlah:'2 sdm'},{nama:'Asam jawa',jumlah:'1 sdm'}],

tips:'Nasi lemak tradisional selalu disajikan dengan sambal ikan bilis (teri) — paduan sempurna nasi berlemak + sambal manis pedas.'},

{id:69,emoji:'🥩',title:'Daging Masak Hitam',origin:'asia',category:'utama',waktu:'90 mnt',porsi:'4 porsi',tingkat:'Menengah',
bahan:[{nama:'Daging sapi potong',jumlah:'400 g'},{nama:'Kecap hitam / kecap manis pekat',jumlah:'4 sdm'},{nama:'Bawang putih',jumlah:'6 siung'},{nama:'Jahe',jumlah:'3 cm'},{nama:'Ketumbar',jumlah:'1 sdt'},{nama:'Lada hitam kasar',jumlah:'1 sdt'},{nama:'Gula merah',jumlah:'2 sdm'},{nama:'Asam jawa',jumlah:'1 sdm'},{nama:'Minyak goreng',jumlah:'3 sdm'}],

tips:'Lada hitam kasar yang ditambahkan di akhir memberikan aroma pedas yang berbeda dari lada yang dimasak lama.'},

{id:70,emoji:'🍲',title:'Shabu-Shabu',origin:'asia',category:'utama',waktu:'20 mnt',porsi:'3 porsi',tingkat:'Mudah',

tips:'Daging tipis hanya butuh 10–15 detik dalam kaldu mendidih. Jangan terlalu lama agar tidak alot.'},

{id:71,emoji:'🥘',title:'Paella Ayam Spanyol',origin:'eropa',category:'utama',waktu:'60 mnt',porsi:'4 porsi',tingkat:'Menengah',

tips:'Kerak di bagian bawah (socarrat) adalah bagian paling nikmat dari paella — jangan diaduk agar terbentuk.'},

{id:72,emoji:'🍳',title:'Quiche Lorraine',origin:'eropa',category:'utama',waktu:'70 mnt',porsi:'6 porsi',tingkat:'Menengah',
bahan:[{nama:'KULIT: Tepung terigu',jumlah:'200 g'},{nama:'Mentega dingin potong dadu',jumlah:'100 g'},{nama:'Garam',jumlah:'½ sdt'},{nama:'Air es',jumlah:'4–5 sdm'},{nama:'ISIAN: Telur',jumlah:'4 btr'},{nama:'Susu cair / krim',jumlah:'250 ml'},{nama:'Sosis / daging asap iris',jumlah:'150 g'},{nama:'Keju cheddar parut',jumlah:'100 g'},{nama:'Bawang bombay iris',jumlah:'1 bh'},{nama:'Garam, merica, pala',jumlah:'sck'}],

tips:'Quiche yang baik harus ber-wobbly sedikit di tengah saat dikeluarkan dari oven — akan mengeras saat dingin.'},

{id:73,emoji:'🍝',title:'Carbonara Creamy',origin:'eropa',category:'utama',waktu:'25 mnt',porsi:'3 porsi',tingkat:'Mudah',

{id:74,emoji:'🥞',title:'Pancake Fluffy Amerika',origin:'amerika',category:'utama',waktu:'25 mnt',porsi:'8–10 kue',tingkat:'Mudah',

// ── STATE
let ori='semua',cat='semua',curRandom=null;

const ORI_LABEL={indonesia:'Indonesia',asia:'Asia',eropa:'Eropa',amerika:'Amerika'};
const ORI_CLASS={indonesia:'bi',asia:'ba',eropa:'be',amerika:'bam'};
const CAT_LABEL={utama:'Menu Utama',camilan:'Camilan',minuman:'Minuman'};

function setOri(v,btn){ori=v;document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render();}
function setCat(v,btn){cat=v;document.querySelectorAll('.cbtn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render();}

function getFiltered(){
  const q=document.getElementById('si').value.toLowerCase();
  return DATA.filter(d=>{
    if(ori!=='semua'&&d.origin!==ori)return false;
    if(cat!=='semua'&&d.category!==cat)return false;
    if(q&&!d.title.toLowerCase().includes(q)&&!d.bahan.some(b=>b.nama.toLowerCase().includes(q)))return false;
    return true;
  });
}

function render(){
  const filtered=getFiltered();
  document.getElementById('countDisplay').textContent=filtered.length+' resep';
  if(!filtered.length){document.getElementById('grid').innerHTML='<div class="no-res">🔍 Tidak ada resep yang ditemukan</div>';return;}

  const groups={utama:[],camilan:[],minuman:[]};
  filtered.forEach(d=>groups[d.category].push(d));

  let html='';
  [['utama','🍽 Menu Utama'],['camilan','🍿 Camilan'],['minuman','🥤 Minuman']].forEach(([k,label])=>{
    if(!groups[k].length)return;
    html+=`<div class="sec-title">${label}<span class="ln"></span></div><div class="cards">`;
    groups[k].forEach(d=>{
      html+=`<div class="card" onclick="openR(${d.id})">
        <div class="card-em">${d.emoji}<span class="card-bdr ${ORI_CLASS[d.origin]}">${ORI_LABEL[d.origin]}</span></div>
        <div class="card-body"><div class="card-title">${d.title}</div>
        <div class="card-meta"><span>⏱${d.waktu}</span><span class="dot"></span><span>${d.tingkat}</span></div>
        </div></div>`;
    });
    html+='</div>';
  });
  document.getElementById('grid').innerHTML=html;
}

function openR(id){
  const d=DATA.find(x=>x.id===id);if(!d)return;
  document.getElementById('mEm').textContent=d.emoji;
  document.getElementById('mTit').textContent=d.title;
  document.getElementById('mMeta').innerHTML=`<span>⏱ ${d.waktu}</span><span>👥 ${d.porsi}</span><span>📊 ${d.tingkat}</span>`;
  document.getElementById('mTags').innerHTML=`<span class="badge ${ORI_CLASS[d.origin]}" style="color:inherit;">${ORI_LABEL[d.origin]}</span><span class="badge" style="background:#f0ece6;color:#6B4C2A;">${CAT_LABEL[d.category]}</span>`;
  document.getElementById('mIng').innerHTML=d.bahan.map(b=>`<div class="ing"><span class="idot"></span><span>${b.nama}</span><span class="iamt">${b.jumlah}</span></div>`).join('');
  document.getElementById('mSteps').innerHTML=d.langkah.map((s,i)=>`<div class="step"><div class="snum">${i+1}</div><div class="stext">${s}</div></div>`).join('');
  if(d.tips){document.getElementById('mTipsWrap').style.display='block';document.getElementById('mTips').textContent=d.tips;}
  else document.getElementById('mTipsWrap').style.display='none';
  document.getElementById('recipeModal').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeMR(){document.getElementById('recipeModal').classList.remove('open');document.body.style.overflow='';}

function rollRandom(){
  const pool=getFiltered().length?getFiltered():DATA;
  curRandom=pool[Math.floor(Math.random()*pool.length)];
  const d=curRandom;
  document.getElementById('rResult').innerHTML=`<span class="r-em">${d.emoji}</span><h2>${d.title}</h2><p>${ORI_LABEL[d.origin]} · ${CAT_LABEL[d.category]} · ${d.waktu} · ${d.tingkat}</p>`;
  document.getElementById('btnVR').onclick=()=>{document.getElementById('randomModal').classList.remove('open');setTimeout(()=>openR(d.id),220);};
}
function openRandom(){rollRandom();document.getElementById('randomModal').classList.add('open');}

render();
</script>
